# Pre-commit hooks - copy as .pre-commit-config.yaml
# Install: uv run pre-commit install

repos:
  - repo: local
    hooks:
      - id: uv-sync
        name: uv-sync
        entry: uv sync --quiet
        language: system
        always_run: true
        pass_filenames: false

      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: true
        stages: [pre-commit]

      - id: check-object-annotations
        name: check-object-annotations
        entry: uv run python reusable/linting/check_object_annotations.py
        language: system
        types: [python]

      - id: check-frozen-dataclasses
        name: check-frozen-dataclasses
        entry: uv run python reusable/linting/check_frozen_dataclasses.py
        language: system
        types: [python]

      - id: check-module-mutables
        name: check-module-mutables
        entry: uv run python reusable/linting/check_module_mutables.py
        language: system
        types: [python]

      - id: check-type-ignore
        name: check-type-ignore
        entry: uv run python reusable/linting/check_type_ignore.py
        language: system
        types: [python]

      - id: check-raw-dicts
        name: check-raw-dicts
        entry: uv run python reusable/linting/check_raw_dicts.py
        language: system
        types: [python]
