# Pre-commit hooks - copy as .pre-commit-config.yaml
# Install: uv run pre-commit install

repos:
  - repo: local
    hooks:
      - id: uv-sync
        name: uv-sync
        entry: uv sync --quiet
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        stages: [pre-commit]
        pass_filenames: true
